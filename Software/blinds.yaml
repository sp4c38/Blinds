substitutions:
  dev: "Leon Blinds"
  PIN_RELAY_DPDT_A: "4"    # GPIO4
  PIN_RELAY_DPDT_B: "0"    # GPIO0 (boot strap pin)
  PIN_RELAY_POWER: "5"    # GPIO5
  PIN_IR:          "13"
  PIN_IR_PWR:      "14"

  dead_time_ms: "300"
  extra_close_ms: "20700"
  extra_open_ms:  "50"
  max_run_ms: "60000"

  ir_warmup_ms:   "120"     # time to let IR settle before we rely on it
  ir_failsafe_ms: "180000"  # turn IR off after 3 min max, just in case

esphome:
  name: blinds-leon
  on_boot:
    priority: -10
    then:
      - script.execute: after_boot

esp8266:
  board: esp12e

# Enable logging
logger:

# Enable Home Assistant API
api:
  # Encrypt all the traffic between the ESP and Home Assistant. You need to set the same key in Home Assistant during setup.
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Blinds Leon Fallback Hotspot"
    password: !secret wifi_ap_password

web_server: # Enable the optional web server
  port: 80    
  version: 3
  local: true
  auth:
    username: !secret web_user
    password: !secret web_pass

button:
  - platform: restart
    id: restart_device
    name: "${dev} Restart"
  - platform: template
    id: nudge_open_button
    name: "${dev} Nudge Open"
    on_press:
      then:
        - script.execute: nudge_open
  - platform: template
    id: nudge_close_button
    name: "${dev} Nudge Close"
    on_press:
      then:
        - script.execute: nudge_close

switch:
  - platform: gpio
    id: relay_power
    name: "${dev} Motor Power"
    pin: ${PIN_RELAY_POWER}
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: relay_dpdt_a
    name: "${dev} DPDT A"
    pin: ${PIN_RELAY_DPDT_A}
    restore_mode: ALWAYS_OFF
    # interlock: [relay_dpdt_b]
    # interlock_wait_time: ${dead_time_ms}ms

  - platform: gpio
    id: relay_dpdt_b
    name: "${dev} DPDT B"
    pin: ${PIN_RELAY_DPDT_B}
    restore_mode: ALWAYS_OFF
    # interlock: [relay_dpdt_a]
    # interlock_wait_time: ${dead_time_ms}ms

  # IR LED power
  - platform: gpio
    id: ir_led
    name: "${dev} IR LED"
    pin: ${PIN_IR_PWR}
    restore_mode: ALWAYS_OFF

binary_sensor:
  - platform: gpio
    id: btn_wall
    name: "${dev} Wall Button"
    pin:
      number: 12
      mode: INPUT
    on_press:
      then:
        - script.execute: btn_long_press
        - if:
            condition:
              lambda: 'return !id(is_opening) && !id(is_closing);'
            then:
              - if:
                  condition:
                    lambda: 'return id(ir_present).state;'
                  then:
                    - script.execute: start_open
                  else:
                    - script.execute: start_close
            else:
              - script.execute: stop_motor
    on_release:
      then:
        - script.stop: btn_long_press
  - platform: gpio
    id: ir_raw
    internal: true
    pin:
      number: ${PIN_IR}
      mode: INPUT
      inverted: true
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      then:
        - lambda: |-
            if (id(ir_led).state) {
              id(ir_last_state) = true;
              id(ir_present).publish_state(true);
            }
        - if:
            condition:
              lambda: 'return id(is_closing);'
            then:
              - script.execute: after_detect_close
    on_release:
      then:
        - lambda: |-
            if (id(ir_led).state) {
              id(ir_last_state) = false;
              id(ir_present).publish_state(false);
            }
        - if:
            condition:
              lambda: 'return id(is_opening);'
            then:
              - script.execute: after_detect_open

  - platform: template
    id: ir_present
    name: "${dev} IR Present"
    lambda: |-
      return id(ir_last_state);

# ------------------ Flags + scripts ------------------
globals:
  - id: is_opening
    type: bool
    initial_value: "false"
  - id: is_closing
    type: bool
    initial_value: "false"
  - id: ir_last_state
    type: bool
    initial_value: "false"

script:
  - id: after_boot
    mode: restart
    then:
      - delay: 1s
      - switch.turn_off: ir_led
      - script.execute: boot_open_if_needed
  - id: boot_open_if_needed
    mode: restart
    then:
      - delay: 300ms
      - switch.turn_on: ir_led
      - delay: ${ir_warmup_ms}ms
      - lambda: |-
          const bool raw = id(ir_raw).state;
          id(ir_last_state) = raw;
          id(ir_present).publish_state(raw);
          if (raw) {
            id(start_open).execute();
          }
      - if:
          condition:
            lambda: 'return !id(ir_last_state);'
          then:
            - switch.turn_off: ir_led
  - id: nudge_open
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(is_opening) || id(is_closing);'
          then:
            - script.execute: stop_motor
      - script.execute: start_open
      - delay: 1s
      - script.execute: stop_motor

  - id: nudge_close
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(is_opening) || id(is_closing);'
          then:
            - script.execute: stop_motor
      - script.execute: start_close
      - delay: 1s
      - script.execute: stop_motor
  # Power IR briefly before motion and arm a failsafe auto-off
  - id: ir_power_on
    mode: restart
    then:
      - switch.turn_on: ir_led
      - delay: ${ir_warmup_ms}ms
      - script.execute: ir_auto_off

  - id: ir_auto_off
    mode: restart
    then:
      - delay: ${ir_failsafe_ms}ms
      - if:
          condition:
            lambda: 'return !id(is_opening) && !id(is_closing);'
          then:
            - switch.turn_off: ir_led

  - id: watchdog
    mode: restart
    then:
      - delay: ${max_run_ms}ms
      - script.execute: stop_motor

  - id: stop_motor
    mode: restart
    then:
      - lambda: |-
          id(is_opening) = false;
          id(is_closing) = false;
      - script.stop: after_detect_close
      - script.stop: watchdog
      - switch.turn_off: relay_power
      - delay: ${dead_time_ms}ms
      - switch.turn_off: relay_dpdt_a
      - switch.turn_off: relay_dpdt_b
      - switch.turn_off: ir_led       # ensure IR is OFF when idle

  - id: start_open
    mode: restart
    then:
      - script.stop: boot_open_if_needed
      - script.stop: after_detect_close
      - script.stop: after_detect_open
      - script.stop: watchdog
      - lambda: |-
          id(is_opening) = true;
          id(is_closing) = false;
      - script.execute: ir_power_on
      - switch.turn_off: relay_power
      - delay: ${dead_time_ms}ms
      - switch.turn_off: relay_dpdt_a
      - switch.turn_off: relay_dpdt_b
      - switch.turn_on: relay_power
      - script.execute: watchdog

  - id: start_close
    mode: restart
    then:
      - script.stop: boot_open_if_needed
      - script.stop: after_detect_close
      - script.stop: after_detect_open
      - script.stop: watchdog
      - lambda: |-
          id(is_opening) = false;
          id(is_closing) = true;
      - script.execute: ir_power_on
      - switch.turn_off: relay_power
      - delay: ${dead_time_ms}ms
      - switch.turn_on: relay_dpdt_a
      - switch.turn_on: relay_dpdt_b
      - switch.turn_on: relay_power
      - script.execute: watchdog
      - delay: 30ms
      - lambda: |-
          if (id(ir_present).state || id(ir_raw).state) {
            id(after_detect_close).execute();
          }

  - id: after_detect_open
    mode: restart
    then:
      - delay: ${extra_open_ms}ms
      - if:
          condition:
            lambda: 'return id(is_opening);'
          then:
            - script.execute: stop_motor
            - cover.template.publish:
                id: blind
                state: OPEN

  - id: btn_long_press
    mode: restart
    then:
      - delay: 4s
      - if:
          condition:
            lambda: 'return id(btn_wall).state;'
          then:
            - logger.log: "Wall button long press - restarting"
            - button.press: restart_device

  - id: after_detect_close
    mode: restart
    then:
      - delay: ${extra_close_ms}ms
      - if:
          condition:
            lambda: 'return id(is_closing);'
          then:
            - lambda: |-
                id(ir_last_state) = true;
                id(ir_present).publish_state(true);
            - cover.template.publish:
                id: blind
                state: CLOSED
            - script.execute: stop_motor

# ------------------ HA cover ------------------
cover:
  - platform: template
    id: blind
    name: "${dev}"
    device_class: blind
    has_position: false
    lambda: |-
      // IR present => CLOSED, otherwise OPEN
      return id(ir_present).state ? COVER_CLOSED : COVER_OPEN;
    open_action:
      - script.execute: start_open
    close_action:
      - script.execute: start_close
    stop_action:
      - script.execute: stop_motor